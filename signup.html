<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Zia Website</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .signup-container {
            max-width: 400px;
            margin: 60px auto;
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
        }

        .signup-container h2 {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 1rem;
        }

        .form-group input:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 5px rgba(76, 175, 80, 0.2);
        }

        .btn-signup-submit {
            width: 100%;
            padding: 12px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .btn-signup-submit:hover {
            background-color: #45a049;
        }

        .signup-links {
            text-align: center;
            margin-top: 20px;
        }

        .signup-links a {
            color: #2196F3;
            text-decoration: none;
        }

        .signup-links a:hover {
            text-decoration: underline;
        }

        .error {
            color: #f44336;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #ffebee;
            border-radius: 5px;
            display: none;
        }

        .success {
            color: #4CAF50;
            margin-bottom: 15px;
            padding: 10px;
            background-color: #e8f5e9;
            border-radius: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🌐 Zia Website</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
            <div class="cart-icon">
                <a href="#cart">🛒 Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <!-- Signup Container -->
    <div class="signup-container">
        <h2>✍️ Create Account</h2>
        
        <div id="error-message" class="error"></div>
        <div id="success-message" class="success"></div>

        <form id="signup-form" onsubmit="handleSignup(event)">
            <div class="form-group">
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required minlength="6">
            </div>

            <div class="form-group">
                <label for="confirm-password">Confirm Password:</label>
                <input type="password" id="confirm-password" name="confirm-password" required minlength="6">
            </div>

            <button type="submit" class="btn-signup-submit">Sign Up</button>
        </form>

        <div class="signup-links">
            <p>Already have an account? <a href="login.html">Login Here</a></p>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Zia Website by Zia Ur Rehman. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        function handleSignup(event) {
            event.preventDefault();
            
            const fullname = document.getElementById('fullname').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirm-password').value;
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            if (password !== confirmPassword) {
                errorDiv.textContent = '❌ Passwords do not match!';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
                return;
            }

            if (fullname && email && password) {
                localStorage.setItem('currentUser', JSON.stringify({
                    fullname: fullname,
                    email: email,
                    loggedIn: true
                }));

                successDiv.textContent = '✅ Account created successfully! Redirecting to login...';
                successDiv.style.display = 'block';
                errorDiv.style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);
            } else {
                errorDiv.textContent = '❌ Please fill all fields!';
                errorDiv.style.display = 'block';
                successDiv.style.display = 'none';
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
        });
    </script>
</body>
                  </html>
