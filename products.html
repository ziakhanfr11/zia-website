<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products - Zia Website</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container">
            <div class="nav-brand">
                <h1>🌐 Zia Website</h1>
            </div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html" class="active">Products</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="portfolio.html">Portfolio</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="login.html" class="btn-login">Login</a></li>
            </ul>
            <div class="cart-icon">
                <a href="#cart">🛒 Cart (<span id="cart-count">0</span>)</a>
            </div>
        </div>
    </nav>

    <!-- Page Header -->
    <section style="background: linear-gradient(135deg, #4CAF50, #2196F3); color: white; padding: 50px 20px; text-align: center;">
        <div class="container">
            <h2>🛍️ Our Products</h2>
            <p>Browse our amazing collection of products</p>
        </div>
    </section>

    <!-- Filter Section -->
    <section style="background-color: #f5f5f5; padding: 30px 20px;">
        <div class="container">
            <h4>🔍 Filter by Category:</h4>
            <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px;">
                <button class="btn btn-primary" onclick="filterProducts('all')">All Products</button>
                <button class="btn btn-secondary" onclick="filterProducts('electronics')">Electronics</button>
                <button class="btn btn-secondary" onclick="filterProducts('accessories')">Accessories</button>
                <button class="btn btn-secondary" onclick="filterProducts('clothing')">Clothing</button>
                <button class="btn btn-secondary" onclick="filterProducts('books')">Books</button>
            </div>
        </div>
    </section>

    <!-- Products Grid -->
    <section style="padding: 60px 20px;">
        <div class="container">
            <div class="products-grid" id="all-products">
                <!-- Products will be loaded here by JavaScript -->
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Zia Website by Zia Ur Rehman. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="js/script.js"></script>
    <script>
        function filterProducts(category) {
            const allProducts = JSON.parse(localStorage.getItem('allProducts')) || products;
            const filtered = category === 'all' ? allProducts : allProducts.filter(p => p.category === category);
            const container = document.getElementById('all-products');

            if (filtered.length === 0) {
                container.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: #999;">No products found in this category.</p>';
                return;
            }

            container.innerHTML = filtered.map(product => `
                <div class="product-card">
                    <img src="${product.image}" alt="${product.name}">
                    <div class="product-card-content">
                        <h4>${product.name}</h4>
                        <p>${product.description}</p>
                        <small style="color: #999;">Category: ${product.category}</small>
                        <div class="product-price">$${product.price.toFixed(2)}</div>
                        <div class="product-card-actions">
                            <button class="btn-add-cart" onclick="addToCart(${product.id})">
                                🛒 Add to Cart
                            </button>
                            <button class="btn-view">
                                👁️ View
                            </button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        document.addEventListener('DOMContentLoaded', function() {
            updateCartCount();
            filterProducts('all');
        });
    </script>
</body>
</html>
